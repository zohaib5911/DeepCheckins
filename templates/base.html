<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}DeepCheckIns{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <header class="topbar">
        <div class="brand"><span class="brand-mark"></span>DeepCheckIns</div>
        <nav class="nav">
            <a href="{{ url_for('summary') }}"
               class="nav-link {% if active_page == 'summary' %}active{% endif %}">Attendance</a>
            <a href="{{ url_for('entries') }}"
               class="nav-link {% if active_page == 'entries' %}active{% endif %}">Activity</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <div id="imgModal" class="modal" aria-hidden="true">
        <img id="imgModalImg" alt="" />
    </div>

    <script>
        (function () {
            const modal = document.getElementById('imgModal');
            const modalImg = document.getElementById('imgModalImg');

            function open(src) {
                modalImg.src = src;
                modal.classList.add('open');
                modal.setAttribute('aria-hidden', 'false');
            }
            function close() {
                modal.classList.remove('open');
                modal.setAttribute('aria-hidden', 'true');
                modalImg.src = '';
            }

            document.addEventListener('click', function (ev) {
                const t = ev.target;
                if (t && t.matches && t.matches('img.zoomable')) {
                    open(t.dataset.full || t.src);
                    ev.stopPropagation();
                    return;
                }
                if (modal.classList.contains('open')) {
                    if (ev.target === modal) close();
                }
            });

            document.addEventListener('keydown', function (ev) {
                if (ev.key === 'Escape' && modal.classList.contains('open')) close();
            });
        })();
    </script>
</body>
</html>
